---
# Install and register GitLab Runners
#
# Prerequisites:
#   - GitLab must be installed and running
#   - Create a runner token in GitLab UI:
#       Admin Area > CI/CD > Runners > New instance runner
#       Copy the glrt-... token when prompted
#
# Run with: ansible-playbook playbooks/install_runners.yml

- name: Install and register GitLab Runners
  hosts: runners
  become: true
  gather_facts: true
  serial: 1

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - apt-transport-https
        state: present
        update_cache: true

    - name: Deploy lab CA cert to runner trust store
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/ssl/lab-ca.crt"
        dest: /usr/local/share/ca-certificates/lab-ca.crt
        mode: "0644"

    - name: Update CA trust store
      ansible.builtin.command: update-ca-certificates
      changed_when: true

    - name: Check if GitLab Runner repo is already configured
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/runner_gitlab-runner.list
      register: runner_repo

    - name: Download GitLab Runner repo setup script
      ansible.builtin.get_url:
        url: "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh"
        dest: /tmp/gitlab_runner_install_repo.sh
        mode: "0755"
      when: not runner_repo.stat.exists

    - name: Run GitLab Runner repo setup script
      ansible.builtin.command: bash /tmp/gitlab_runner_install_repo.sh
      when: not runner_repo.stat.exists
      changed_when: true

    - name: Install gitlab-runner package
      ansible.builtin.apt:
        name: gitlab-runner
        state: present
        update_cache: true

    - name: Ensure gitlab-runner service is started
      ansible.builtin.service:
        name: gitlab-runner
        state: started
        enabled: true

    - name: Check if runner is already registered
      ansible.builtin.command: gitlab-runner list
      register: runner_list
      changed_when: false

    - name: Prompt for runner token
      ansible.builtin.pause:
        prompt: "Enter GitLab runner token for {{ inventory_hostname }} (glrt-...)"
        echo: false
      register: runner_token_input
      when: inventory_hostname not in runner_list.stdout

    - name: Register GitLab Runner
      ansible.builtin.command: >
        gitlab-runner register
        --non-interactive
        --url "{{ gitlab_runner_coordinator_url }}"
        --token "{{ runner_token_input.user_input }}"
        --executor "{{ gitlab_runner_executor }}"
        --description "{{ inventory_hostname }}"
        --tls-ca-file /usr/local/share/ca-certificates/lab-ca.crt
      when: inventory_hostname not in runner_list.stdout
      changed_when: true

    - name: Verify runners registered
      ansible.builtin.command: gitlab-runner list
      register: runner_verify
      changed_when: false

    - name: Show registered runners
      ansible.builtin.debug:
        msg: "{{ runner_verify.stdout_lines }}"
