---
# Install and configure GitLab CE on the gitlab host
# Run with: ansible-playbook playbooks/install_gitlab.yml

- name: Install GitLab
  hosts: gitlab
  become: true
  gather_facts: true

  vars_prompt:
    - name: gitlab_root_password
      prompt: "Set GitLab root password"
      private: true
      confirm: true

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - openssh-server
          - ca-certificates
          - tzdata
          - perl
        state: present
        update_cache: true

    - name: Check if GitLab repo script already ran
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/gitlab_gitlab-ce.list
      register: gitlab_repo

    - name: Download GitLab repository setup script
      ansible.builtin.get_url:
        url: "https://packages.gitlab.com/install/repositories/gitlab/{{ gitlab_edition }}/script.deb.sh"
        dest: /tmp/gitlab_install_repo.sh
        mode: "0755"
      when: not gitlab_repo.stat.exists

    - name: Run GitLab repository setup script
      ansible.builtin.command: bash /tmp/gitlab_install_repo.sh
      when: not gitlab_repo.stat.exists
      changed_when: true

    - name: Install GitLab (latest)
      ansible.builtin.apt:
        name: "{{ gitlab_edition }}"
        state: present
        update_cache: true
      environment:
        EXTERNAL_URL: "{{ gitlab_external_url }}"
        GITLAB_ROOT_PASSWORD: "{{ gitlab_root_password }}"
      when: gitlab_version == "latest"

    - name: Install GitLab (pinned version)
      ansible.builtin.apt:
        name: "{{ gitlab_edition }}={{ gitlab_version }}"
        state: present
        update_cache: true
      environment:
        EXTERNAL_URL: "{{ gitlab_external_url }}"
        GITLAB_ROOT_PASSWORD: "{{ gitlab_root_password }}"
      when: gitlab_version != "latest"

    - name: Ensure /etc/gitlab/ssl exists
      ansible.builtin.file:
        path: /etc/gitlab/ssl
        state: directory
        mode: "0700"

    - name: Deploy signed certificate
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/ssl/gitlab.local.crt"
        dest: /etc/gitlab/ssl/gitlab.local.crt
        mode: "0644"

    - name: Deploy certificate key
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/ssl/gitlab.local.key"
        dest: /etc/gitlab/ssl/gitlab.local.key
        mode: "0600"

    - name: Set external_url in gitlab.rb
      ansible.builtin.lineinfile:
        path: /etc/gitlab/gitlab.rb
        regexp: "^external_url"
        line: "external_url '{{ gitlab_external_url }}'"

    - name: Ensure GitLab is running
      ansible.builtin.service:
        name: gitlab-runsvdir
        state: started
        enabled: true

    - name: Reconfigure GitLab
      ansible.builtin.command: gitlab-ctl reconfigure
      changed_when: true

    - name: Set root password (works on fresh and existing installs)
      ansible.builtin.command: >
        gitlab-rake "gitlab:password:reset[root]"
      args:
        stdin: "{{ gitlab_root_password }}\n{{ gitlab_root_password }}\n"
      changed_when: true

    - name: Wait for GitLab to become available
      ansible.builtin.uri:
        url: "{{ gitlab_external_url }}/users/sign_in"
        status_code: 200
        validate_certs: false
      register: gitlab_up
      until: gitlab_up.status == 200
      retries: 36
      delay: 10

    - name: GitLab is ready
      ansible.builtin.debug:
        msg: "GitLab is up at {{ gitlab_external_url }} — login with root"